<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EatWise - Food Ordering App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="/_sdk/element_sdk.js"></script>
  <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100%;
            color: #333;
        }

        html {
            height: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
        }

        .app-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-icon {
            font-size: 1.5rem;
            color: #2c3e50;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-icon:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .cart-count {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Dropdown */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            min-width: 160px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 10px 0;
            display: none;
            z-index: 1000;
        }

        .dropdown-content.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.3s ease;
            color: #333;
        }

        .dropdown-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        /* Search Section */
        .search-section {
            padding: 2rem 0;
            text-align: center;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 1.2rem;
        }

        /* Category Buttons */
        .category-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .category-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .category-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            color: white;
        }

        /* Food Grid */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 2rem 0;
        }

        .food-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .food-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .food-price {
            font-size: 1.2rem;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .food-details {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .food-type {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .veg {
            background: #27ae60;
            color: white;
        }

        .non-veg {
            background: #e74c3c;
            color: white;
        }

        .card-expanded {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .card-expanded.show {
            max-height: 100px;
            padding-top: 15px;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Footer */
        .footer {
            background: rgba(44, 62, 80, 0.9);
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 15px;
            }

            .logo-section {
                order: 1;
            }

            .nav-icons {
                order: 2;
            }

            .food-grid {
                grid-template-columns: 1fr;
            }

            .category-buttons {
                flex-direction: column;
                align-items: center;
            }

            .category-btn {
                width: 200px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <nav class="navbar">
   <div class="container">
    <div class="nav-content">
     <div class="logo-section">
      <div class="logo">
       🍽️
      </div>
      <h1 class="app-title" id="appTitle">EATWISE</h1>
     </div>
     <div class="nav-icons">
      <div class="nav-icon" onclick="goToCart()"><i class="fas fa-shopping-cart"></i> <span class="cart-count" id="cartCount">0</span>
      </div>
      <div class="dropdown">
       <div class="nav-icon" onclick="toggleDropdown()"><i class="fas fa-user"></i>
       </div>
       <div class="dropdown-content" id="profileDropdown">
        <div class="dropdown-item" onclick="goToProfile()">
         View Profile
        </div>
        <div class="dropdown-item" onclick="goToOrders()">
         Orders
        </div>
        <div class="dropdown-item" onclick="logout()">
         Logout
        </div>
       </div>
      </div>
     </div>
    </div>
   </div>
  </nav>
  <div class="container">
   <div class="search-section">
    <div class="search-container"><input type="text" class="search-input" id="searchInput" placeholder="Search for delicious food..."> <i class="fas fa-search search-icon"></i>
    </div>
   </div>
   <div class="category-section">
    <div class="category-buttons"><button class="category-btn active" onclick="filterCategory('all')">All Items</button> <button class="category-btn" onclick="filterCategory('veg')">🥗 Veg</button> <button class="category-btn" onclick="filterCategory('non-veg')">🍖 Non-Veg</button>
    </div>
   </div>
   <div class="food-grid" id="foodGrid"><!-- Food items will be populated by JavaScript -->
   </div>
  </div>
  <footer class="footer">
   <div class="container">
    <p id="footerText">© 2025 EatWise - Eat Smart, Stay Fit</p>
   </div>
  </footer>
  <script>
        // Configuration object for editable features
        const defaultConfig = {
            app_title: "EATWISE",
            search_placeholder: "Search for delicious food...",
            footer_text: "© 2025 EatWise - Eat Smart, Stay Fit"
        };

        // Food items data
        const foodItems = [
            {
                id: 1,
                name: "Grilled Chicken Salad",
                price: "$12.99",
                type: "non-veg",
                protein: "25g",
                vitamins: "Vitamin A, C, K",
                details: "Fresh grilled chicken with mixed greens, cherry tomatoes, and avocado"
            },
            {
                id: 2,
                name: "Quinoa Buddha Bowl",
                price: "$10.99",
                type: "veg",
                protein: "15g",
                vitamins: "Vitamin B, E, Iron",
                details: "Nutritious quinoa with roasted vegetables, chickpeas, and tahini dressing"
            },
            {
                id: 3,
                name: "Salmon Teriyaki",
                price: "$16.99",
                type: "non-veg",
                protein: "30g",
                vitamins: "Omega-3, Vitamin D, B12",
                details: "Fresh salmon glazed with teriyaki sauce, served with steamed broccoli"
            },
            {
                id: 4,
                name: "Mediterranean Wrap",
                price: "$9.99",
                type: "veg",
                protein: "12g",
                vitamins: "Vitamin C, K, Folate",
                details: "Hummus, cucumber, tomatoes, olives, and feta cheese in a whole wheat wrap"
            },
            {
                id: 5,
                name: "Beef Stir Fry",
                price: "$14.99",
                type: "non-veg",
                protein: "28g",
                vitamins: "Vitamin B6, B12, Iron",
                details: "Tender beef strips with mixed vegetables in a savory sauce"
            },
            {
                id: 6,
                name: "Avocado Toast",
                price: "$8.99",
                type: "veg",
                protein: "8g",
                vitamins: "Vitamin K, E, Potassium",
                details: "Smashed avocado on multigrain bread with cherry tomatoes and seeds"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('eatwise-cart')) || [];
        let currentFilter = 'all';
        let expandedCard = null;

        // Initialize the app
        function initApp() {
            renderFoodItems();
            updateCartCount();
            setupSearch();
        }

        // Render food items
        function renderFoodItems() {
            const foodGrid = document.getElementById('foodGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredItems = foodItems.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                const matchesFilter = currentFilter === 'all' || item.type === currentFilter;
                return matchesSearch && matchesFilter;
            });

            foodGrid.innerHTML = filteredItems.map(item => `
                <div class="food-card" onclick="toggleCard(${item.id})">
                    <div class="food-type ${item.type}">${item.type === 'veg' ? '🥬 VEG' : '🍖 NON-VEG'}</div>
                    <div class="food-name">${item.name}</div>
                    <div class="food-price">${item.price}</div>
                    <div class="food-details">
                        <strong>Protein:</strong> ${item.protein}<br>
                        <strong>Vitamins:</strong> ${item.vitamins}<br>
                        ${item.details}
                    </div>
                    <div class="card-expanded" id="expanded-${item.id}">
                        <button class="add-to-cart-btn" onclick="addToCart(${item.id}, event)">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Toggle card expansion
        function toggleCard(itemId) {
            const expandedElement = document.getElementById(`expanded-${itemId}`);
            
            // Close previously expanded card
            if (expandedCard && expandedCard !== itemId) {
                const prevExpanded = document.getElementById(`expanded-${expandedCard}`);
                if (prevExpanded) {
                    prevExpanded.classList.remove('show');
                }
            }

            // Toggle current card
            if (expandedCard === itemId) {
                expandedElement.classList.remove('show');
                expandedCard = null;
            } else {
                expandedElement.classList.add('show');
                expandedCard = itemId;
            }
        }

        // Add item to cart
        function addToCart(itemId, event) {
            event.stopPropagation();
            
            const item = foodItems.find(food => food.id === itemId);
            const existingItem = cart.find(cartItem => cartItem.id === itemId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            
            localStorage.setItem('eatwise-cart', JSON.stringify(cart));
            updateCartCount();
            
            // Show feedback
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = 'Added!';
            button.style.background = '#27ae60';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '';
            }, 1000);
        }

        // Update cart count
        function updateCartCount() {
            const cartCount = document.getElementById('cartCount');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            cartCount.style.display = totalItems > 0 ? 'flex' : 'none';
        }

        // Filter by category
        function filterCategory(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Close any expanded cards
            if (expandedCard) {
                const expandedElement = document.getElementById(`expanded-${expandedCard}`);
                if (expandedElement) {
                    expandedElement.classList.remove('show');
                }
                expandedCard = null;
            }
            
            renderFoodItems();
        }

        // Setup search functionality
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', () => {
                // Close any expanded cards when searching
                if (expandedCard) {
                    const expandedElement = document.getElementById(`expanded-${expandedCard}`);
                    if (expandedElement) {
                        expandedElement.classList.remove('show');
                    }
                    expandedCard = null;
                }
                renderFoodItems();
            });
        }

        // Store original page content
        let originalPageContent = null;

        // Load user data from localStorage or use defaults
        let userData = JSON.parse(localStorage.getItem('eatwise-userdata')) || {
            name: "SANTHOSH C",
            email: "santhosh0622gmail.com",
            phone: "+91 9876543212",
            address: "Door No:8,Dubai kuruku santhu,Dubai Main road,Dubai bus stand, Dubai-622002",
            joinDate: "January 2024",
            totalOrders: 15,
            favoriteFood: "Chicken briyani"
        };

        // Load orders from localStorage or start with empty array
        let ordersData = JSON.parse(localStorage.getItem('eatwise-orders')) || [];

        // Navigation functions
        function goToCart() {
            // Store the current page content before navigating to cart
            if (!originalPageContent) {
                originalPageContent = document.body.innerHTML;
            }

            // Create cart page content
            const cartItems = cart.map(item => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;">
                    <div>
                        <h3 style="margin: 0; color: #2c3e50;">${item.name}</h3>
                        <p style="margin: 5px 0; color: #666;">Quantity: ${item.quantity}</p>
                    </div>
                    <div style="font-weight: bold; color: #ff6b6b;">${item.price}</div>
                </div>
            `).join('');

            const cartPage = `
                <div style="max-width: 800px; margin: 0 auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                    <div style="display: flex; align-items: center; margin-bottom: 30px;">
                        <button onclick="goBackToMenu()" style="background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; padding: 10px 15px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; margin-right: 15px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h1 style="margin: 0; color: #2c3e50;">Your Cart</h1>
                    </div>
                    ${cart.length === 0 ? 
                        '<p style="text-align: center; color: #666; font-size: 1.2rem; padding: 40px;">Your cart is empty</p>' : 
                        cartItems + `
                        <div style="text-align: center; margin-top: 30px;">
                            <button onclick="proceedToBuy()" style="padding: 15px 40px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                                Proceed to Buy
                            </button>
                        </div>`
                    }
                </div>
            `;

            document.body.innerHTML = `
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px;">
                    ${cartPage}
                </div>
            `;
        }

        function goToProfile() {
            // Store the current page content before navigating to profile
            if (!originalPageContent) {
                originalPageContent = document.body.innerHTML;
            }

            const profilePage = `
                <div style="max-width: 800px; margin: 0 auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                    <div style="display: flex; align-items: center; margin-bottom: 30px;">
                        <button onclick="goBackToMenu()" style="background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; padding: 10px 15px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; margin-right: 15px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h1 style="margin: 0; color: #2c3e50;">My Profile</h1>
                    </div>
                    
                    <div style="display: flex; align-items: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 15px; color: white;">
                        <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-right: 20px;">
                            👤
                        </div>
                        <div>
                            <h2 style="margin: 0; font-size: 1.8rem;">${userData.name}</h2>
                            <p style="margin: 5px 0; opacity: 0.9;">Member since ${userData.joinDate}</p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem; color: #667eea; margin-bottom: 10px;">📧</div>
                            <h3 style="margin: 0; color: #2c3e50;">Email</h3>
                            <p style="margin: 5px 0; color: #666;">${userData.email}</p>
                        </div>
                        <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem; color: #667eea; margin-bottom: 10px;">📱</div>
                            <h3 style="margin: 0; color: #2c3e50;">Phone</h3>
                            <p style="margin: 5px 0; color: #666;">${userData.phone}</p>
                        </div>
                        <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem; color: #667eea; margin-bottom: 10px;">🛍️</div>
                            <h3 style="margin: 0; color: #2c3e50;">Total Orders</h3>
                            <p style="margin: 5px 0; color: #666; font-weight: bold; font-size: 1.2rem;">${userData.totalOrders}</p>
                        </div>
                        <div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center;">
                            <div style="font-size: 2rem; color: #667eea; margin-bottom: 10px;">❤️</div>
                            <h3 style="margin: 0; color: #2c3e50;">Favorite Food</h3>
                            <p style="margin: 5px 0; color: #666;">${userData.favoriteFood}</p>
                        </div>
                    </div>

                    <div style="padding: 20px; background: #f8f9fa; border-radius: 10px;">
                        <h3 style="margin: 0 0 15px 0; color: #2c3e50; display: flex; align-items: center;">
                            <span style="font-size: 1.5rem; margin-right: 10px;">🏠</span>
                            Delivery Address
                        </h3>
                        <p style="margin: 0; color: #666; line-height: 1.5;">${userData.address}</p>
                        <button onclick="editAddress()" style="margin-top: 15px; padding: 10px 20px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                            Edit Address
                        </button>
                    </div>

                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="logout()" style="padding: 12px 30px; background: #e74c3c; color: white; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; margin-right: 15px;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                            Logout

        function filterOrders(filterType) {
            currentOrderFilter = filterType;
            renderOrdersPage();
        }

        function sortOrders(sortType) {
            // Create a copy of ordersData to sort
            let sortedOrders = [...ordersData];
            
            switch(sortType) {
                case 'date-desc':
                    sortedOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'date-asc':
                    sortedOrders.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'amount-desc':
                    sortedOrders.sort((a, b) => parseFloat(b.total.replace('$', '')) - parseFloat(a.total.replace('$', '')));
                    break;
                case 'amount-asc':
                    sortedOrders.sort((a, b) => parseFloat(a.total.replace('$', '')) - parseFloat(b.total.replace('$', '')));
                    break;
                case 'status':
                    const statusOrder = { 'Pending': 1, 'Delivered': 2, 'Cancelled': 3 };
                    sortedOrders.sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);
                    break;
            }
            
            // Update the global ordersData temporarily for rendering
            const originalOrders = [...ordersData];
            ordersData.splice(0, ordersData.length, ...sortedOrders);
            renderOrdersPage();
            // Restore original order
            ordersData.splice(0, ordersData.length, ...originalOrders);
        }

            }

        function saveProfile(event) {
            event.preventDefault();
            
            // Get form values
            const newName = document.getElementById('editName').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            const newAddress = document.getElementById('editAddress').value.trim();

            // Validate inputs
            if (!newName || !newEmail || !newPhone || !newAddress) {
                showNotification('Please fill in all fields', 'error');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(newEmail)) {
                showNotification('Please enter a valid email address', 'error');
                return;
            }

            // Update user data
            userData.name = newName;
            userData.email = newEmail;
            userData.phone = newPhone;
            userData.address = newAddress;

            // Save to localStorage
            localStorage.setItem('eatwise-userdata', JSON.stringify(userData));

            showNotification('Profile updated successfully!', 'success');

        function logout() {
            // Clear user session data
            localStorage.removeItem('eatwise-cart');
            localStorage.removeItem('eatwise-userdata');
            
            // Show logout message
            showNotification('Logging out...', 'success');
            
            // Navigate to login page after a short delay
            setTimeout(() => {
                window.open('customerlogin.html', '_blank', 'noopener,noreferrer');

        function proceedToBuy() {
            if (cart.length === 0) {
                showNotification('Your cart is empty!', 'error');
                return;
            }

            // Calculate total amount
            const totalAmount = cart.reduce((sum, item) => {
                const price = parseFloat(item.price.replace('$', ''));
                return sum + (price * item.quantity);
            }, 0);

            // Show processing animation
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = 'Processing...';
            button.style.background = '#95a5a6';
            button.disabled = true;

            // Simulate payment processing
            setTimeout(() => {
                // Generate new order ID
                const orderNumber = `ORD${String(ordersData.length + 1).padStart(3, '0')}`;
                
                // Create new order object
                const newOrder = {
                    id: orderNumber,
                    date: new Date().toISOString().split('T')[0], // Current date in YYYY-MM-DD format
                    status: "Pending",
                    items: cart.map(item => `${item.name} (x${item.quantity})`),
                    total: `$${totalAmount.toFixed(2)}`,
                    deliveryTime: "30-45 mins"
                };

                // Add to orders array and save to localStorage
                ordersData.unshift(newOrder); // Add to beginning of array (newest first)
                localStorage.setItem('eatwise-orders', JSON.stringify(ordersData));
                
                // Clear the cart
                cart = [];
                localStorage.setItem('eatwise-cart', JSON.stringify(cart));
                
                // Show success message
                showNotification(`Order #${orderNumber} placed successfully! Total: $${totalAmount.toFixed(2)}`, 'success');
                
                // Update cart count
                updateCartCount();
                
                // Go back to menu after a short delay
                setTimeout(() => {
                    goBackToMenu();
                }, 2000);
            }, 2000);
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 2000;
                animation: slideIn 0.3s ease;
                ${type === 'success' ? 'background: #27ae60;' : 'background: #e74c3c;'}
            `;
            notification.textContent = message;

            // Add animation keyframes
            if (!document.querySelector('#notification-styles')) {
                const style = document.createElement('style');
                style.id = 'notification-styles';
                style.textContent = `
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                `;
                document.head.appendChild(style);
            }

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
