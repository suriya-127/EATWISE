<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EATWISE - Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.95), rgba(42, 82, 152, 0.95)),
                        url('https://images.unsplash.com/photo-1495195134817-aeb325a55b65?w=1600') center/cover no-repeat fixed;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
        }

        .brand-section {
            max-width: 500px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .brand-name {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.95;
            margin-top: 20px;
        }

        .features {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.9;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 60px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 15px;
            color: #666;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-card {
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .login-card:hover {
            border-color: #2563eb;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.12);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .restaurant-card .card-icon {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }

        .arrow {
            color: #9ca3af;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .login-card:hover .arrow {
            color: #2563eb;
            transform: translateX(5px);
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .card-description {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 968px) {
            body {
                flex-direction: column;
            }

            .left-panel {
                padding: 40px 20px;
                min-height: 300px;
            }

            .brand-section {
                text-align: center;
            }

            .features {
                display: none;
            }

            .right-panel {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="brand-section">
            <div class="logo-container">
                <div class="logo">🍽️</div>
                <div class="brand-name">EATWISE</div>
            </div>
            <p class="tagline">
            </p>
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">✓</div>
                    <span>Eat better live Wiser</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✓</div>
                    <span>Real-time order tracking</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✓</div>
                    <span>24/7 customer support</span>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-container">
            <div class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Select your account type to continue</p>
            </div>

            <div class="login-options">
                <div class="login-card customer-card" onclick="loginAs('customer')">
                    <div class="card-header">
                        <div class="card-icon">👤</div>
                        <div class="arrow">→</div>
                    </div>
                    <h3 class="card-title">Customer Login</h3>
                    <p class="card-description">
                    </p>
                </div>

                <div class="login-card restaurant-card" onclick="loginAs('restaurant')">
                    <div class="card-header">
                        <div class="card-icon">🏪</div>
                        <div class="arrow">→</div>
                    </div>
                    <h3 class="card-title">Restaurant Login</h3>
                    <p class="card-description">
                    </p>
                </div>
            </div>

            <div class="footer">
                Don't have an account? <a href="#">Sign up</a><br>
                <span style="margin-top: 10px; display: inline-block;">© 2024 EATWISE. All rights reserved.</span>
            </div>
        </div>
    </div>

    <script>
        function loginAs(type) {
            if (type === 'customer') {
                window.location.href = 'customerlogin.html';
            } else if (type === 'restaurant') {
                window.location.href = 'restaurantlogin.html';
            }
        }
    </script>
</body>
</html>
